name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI-PARITY RULE:
# Every step in this workflow MUST match a step in `task ci` (Taskfile.yml).
# If you change one, change the other in the same commit. Diverging them
# breaks the test-and-commit discipline documented in CLAUDE.md.

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Format check (ruff format --check)
        run: uv run ruff format --check src tests

      - name: Unit tests
        run: uv run pytest tests/unit -v

      - name: Integration tests (no API)
        run: uv run pytest tests/integration -m "not requires_api" -v
        # Will be a no-op until Task 10 adds the first integration test.
        continue-on-error: false
